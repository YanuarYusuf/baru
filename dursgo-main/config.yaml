# ============================================================
#           DursGo Configuration Template
# ============================================================
# This file provides a template for all supported authentication methods.
# Uncomment and configure the desired authentication block.
# Note: Only one authentication method can be active at a time.
# ============================================================

# --- GENERAL SETTINGS ---
# Target URL for scanning
target: "https://0ad50029037eda1980ad03b700f000b8.web-security-academy.net/"
concurrency: 10
max_depth: 5
scanners_to_run: "csrf"
#"none,xss,sqli,lfi,openredirect,ssrf,exposed,idor,csrf,cmdinjection,ssti,securityheaders,cors,fileupload,bola,massassignment,graphql,blindssrf,domxss"

# Settings Blind Scanner
oast: false
render_js: false
user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/108.0.0.0 Safari/537.36"

# AI (LLM) Integration Settings
ai:
  enabled: false
  provider: "deepseek" # Supported: "gemini", "groq"
  api_key: "sk-6e21db45bf2c4b3ba9cdb8f3d217d3df"
  model: "deepseek-chat"
  # --- Other Provider Examples ---
  # provider: "groq"
  # api_key: "GROQ_API_KEY"
  # model: "meta-llama/llama-4-scout-17b-16e-instruct"

# Output settings
output:
  verbose: false
  format: "json"
  output_file: "report-scan.json"

# ============================================================
#                   AUTHENTICATION METHODS
# ============================================================
# Select ONE of the following four methods and uncomment its block.

authentication:
  # Set 'enabled: true' for the selected method.
  # Ensure only one authentication block is enabled.
  enabled: true

  # (IDOR SCANNER) Specify the numeric ID of the authenticated user.
  # This is used to prevent false positives during IDOR vulnerability checks.
  scan_idor: 9999


# --- OPTION 1: Form-Based Authentication (Dynamic Login) ---
# Use for standard username/password credentials.
# ------------------------------------------------------------
#
#  # Login form submission endpoint URL
#  login_url: "http://contoh.com/login"
#  
#  # HTTP method for login (typically POST)
#  login_method: "POST"
#  
#  # Credential payload (e.g., URL-encoded string)
#  login_data: "username=admin&password=password123"
#  
#  # (Optional, recommended) Keyword to verify successful login
#  login_check_keyword: "Logout"


# --- OPTION 2: Cookie-Based Authentication (Static) ---
# Use if you have a valid session cookie.
# ------------------------------------------------------------
#
#  # Paste the full cookie string here
  cookie: "session=test"
  cookie: "session=test"  
  cookie: "session=test"
  cookie: "session=test" 
  cookie: "session=test"

